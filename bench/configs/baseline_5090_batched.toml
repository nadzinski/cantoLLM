# Phase-2 close-out baseline, part 1/4: 0.6B batched (process split), 5090.
# Companions: baseline_5090_sequential.toml (the engine comparison),
# baseline_5090_4b.toml (realistic compute), baseline_5090_longctx.toml
# (long-context needs bigger KV slots than this file's 4096) — separate
# runs, joined in the compare view. See bench-spec.md §8.
schema_version = 1
name = "baseline-5090-batched"

[server]
model = "0.6B"
engine = "batched"
device = "cuda"
port = 8377
health_timeout_s = 900
batch_max_seq_len = 4096
max_tokens_per_step = 256

[server.matrix]
max_batch = [8, 16]

[defaults]
dialect = "openai"
max_tokens = 128
ignore_eos = true
temperature = 0.0
warmup_requests = 8
repeats = 3
seed = 0

# Closed-loop sweeps: low levels with modest counts, high levels held for
# >= 8x concurrency so fill/drain edges wash out (bench-spec.md §2).
[[points]]
workload = "short_chat"
mode = "closed"
concurrency = [1, 2, 4]
requests_per_level = 32

[[points]]
workload = "short_chat"
mode = "closed"
concurrency = [8, 16]
requests_per_level = 128

[[points]]
workload = "code"
mode = "closed"
concurrency = [1, 2, 4]
requests_per_level = 32

[[points]]
workload = "code"
mode = "closed"
concurrency = [8, 16]
requests_per_level = 128

# Open-loop knee hunt (rates tuned after first closed-loop numbers land).
[[points]]
workload = "short_chat"
mode = "open"
arrivals = "poisson"
rate_rps = [0.5, 1.0, 2.0, 4.0]
total_requests = 128
max_inflight = 64

# Variants (bench-spec.md §5): natural-stop realism + sampler-path cost.
# Natural-stop needs headroom to actually stop: the Mac smoke showed 0.6B
# (thinking-first) never reaches EOS within 64-128 tokens.
[[points]]
workload = "short_chat"
mode = "closed"
concurrency = [8]
requests_per_level = 64
ignore_eos = false
max_tokens = 512

[[points]]
workload = "short_chat"
mode = "closed"
concurrency = [8]
requests_per_level = 64
temperature = 0.7
top_p = 0.9

# Cross-dialect parity cell.
[[points]]
workload = "short_chat"
mode = "closed"
concurrency = [4]
requests_per_level = 32
dialect = "anthropic"
