<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CantoLLM Chat</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body data-theme="vellum-three-p">
  <header>
    <button id="sidebar-toggle" type="button" aria-label="Toggle sidebar"></button>
    <div class="brand">CantoLLM</div>
    <div class="controls">
      <label>Model
        <select id="model"></select>
      </label>
      <label>Temp <span id="temp-val">0.7</span>
        <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" />
      </label>
      <label>Top-p <span id="topp-val">0.9</span>
        <input type="range" id="top_p" min="0" max="1" step="0.05" value="0.9" />
      </label>
      <label>Max tokens
        <input type="number" id="max_tokens" min="1" max="32768" step="1" value="2048" />
      </label>
      <button id="reset" type="button" title="Clear conversation">Reset</button>
    </div>
  </header>

  <main id="messages" aria-live="polite"></main>

  <div id="hero">
    <h1 class="hero-title">CantoLLM</h1>
    <p class="hero-subtitle">What's on your mind?</p>
  </div>

  <form id="composer">
    <textarea id="input" rows="2" placeholder="Message CantoLLM…  (Enter to send, Shift+Enter for newline)" autofocus></textarea>
    <button id="send" type="submit">Send</button>
  </form>

  <script src="/static/app.js"></script>
</body>
</html>
